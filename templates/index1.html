<!DOCTYPE html>
<html>
<head>
    <title>EirGrid Dashboard</title>
    <style>
        .missing {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>EirGrid Energy Dashboard</h1>

<!-- Date Filter -->
<form method="POST">
    <label>Select Date:</label>
    <select name="date">
        {% for d in dates %}
            <option value="{{ d }}" {% if d == selected_date %}selected{% endif %}>
                {{ d }}
            </option>
        {% endfor %}
    </select>
    <button type="submit">Filter</button>
</form>

<!-- Missing Dates -->
<h3>Missing Dates</h3>
<ul>
    {% for d in missing_dates %}
        <li class="missing">{{ d }}</li>
    {% endfor %}
</ul>

<h2>Data Table</h2>
{{ table | safe }}

<h2>Wind vs Demand</h2>
<img src="{{ wind_plot }}" width="800">

<h2>Renewable Ratio</h2>
<img src="{{ ratio_plot }}" width="800">

<h2>Multi-Day Renewable Trend</h2>
<img src="{{ trend_plot }}" width="800">

</body>
</html>
